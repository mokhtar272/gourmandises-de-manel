  <style>
    html { scroll-behavior: smooth; }
    .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    .animate-slide-up { animation: slideUp 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #ffffff;
  color: #111;
}

.font-display {
  font-family: 'Fraunces', serif;
}

@keyframes blob {
  0%, 100% { border-radius: 40% 60% 60% 40% / 50% 40% 60% 50%; transform: rotate(0deg) scale(1); }
  33% { border-radius: 60% 40% 40% 60% / 40% 60% 40% 60%; transform: rotate(5deg) scale(1.04); }
  66% { border-radius: 50% 50% 60% 40% / 60% 40% 50% 50%; transform: rotate(-3deg) scale(0.97); }
}

@keyframes blob-reverse {
  0%, 100% { border-radius: 60% 40% 40% 60% / 40% 60% 40% 60%; transform: rotate(0deg) scale(1); }
  33% { border-radius: 40% 60% 60% 40% / 50% 40% 60% 50%; transform: rotate(-5deg) scale(1.03); }
  66% { border-radius: 50% 50% 40% 60% / 40% 60% 50% 50%; transform: rotate(4deg) scale(0.98); }
}

.animate-blob { animation: blob 8s ease-in-out infinite; }
.animate-blob-reverse { animation: blob-reverse 10s ease-in-out infinite; }

.bg-mesh-hero {
  background:
    radial-gradient(ellipse at 10% 20%, rgba(200,132,90,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(232,168,124,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(253,238,227,0.5) 0%, transparent 70%);
}

html { scroll-behavior: smooth; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #f5f5f5; }
::-webkit-scrollbar-thumb { background: #C8845A; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b57349; }

  <script>
    window.SiteForge = {
      shopId: "gourmandises-de-manel-d9rb1",
      backendUrl: "https://quickstep-petroleum-dress.ngrok-free.dev",
      enabledModules: [],
      // Default fetch options to bypass ngrok browser warning
      _fetchOpts: function(override) {
        return {
          ...override,
          headers: {
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true',
            ...(override && override.headers ? override.headers : {}),
          },
        };
      },
      // Helper API object
      api: {
        fetchProducts: async function() {
          const r = await fetch(this.root + '/products', window.SiteForge._fetchOpts());
          const d = await r.json();
          return d.products || [];
        },
        createOrder: async function(order) {
          const r = await fetch(this.root + '/orders', window.SiteForge._fetchOpts({
            method: 'POST',
            body: JSON.stringify(order),
          }));
          return await r.json();
        },
        sendContact: async function(data) {
          const r = await fetch(this.root + '/contact', window.SiteForge._fetchOpts({
            method: 'POST',
            body: JSON.stringify(data),
          }));
          return await r.json();
        },
        validatePromo: async function(code, orderTotal) {
          const r = await fetch(this.root + '/promos/validate', window.SiteForge._fetchOpts({
            method: 'POST',
            body: JSON.stringify({ code, orderTotal }),
          }));
          return await r.json();
        },
        getCurrentFlashSale: async function() {
          const r = await fetch(this.root + '/flashsales/current', window.SiteForge._fetchOpts());
          return await r.json();
        },
        getLoyaltyConfig: async function() {
          const r = await fetch(this.root + '/loyalty', window.SiteForge._fetchOpts());
          return await r.json();
        },
        subscribeNewsletter: async function(email, name) {
          const r = await fetch(this.root + '/newsletter/subscribe', window.SiteForge._fetchOpts({
            method: 'POST',
            body: JSON.stringify({ email, name }),
          }));
          return await r.json();
        },
        fetchReviews: async function() {
          const r = await fetch(this.root + '/reviews', window.SiteForge._fetchOpts());
          const d = await r.json();
          return d.reviews || [];
        },
        submitReview: async function(data) {
          const r = await fetch(this.root + '/reviews', window.SiteForge._fetchOpts({
            method: 'POST',
            body: JSON.stringify(data),
          }));
          return await r.json();
        },
      },
      // ─── LIVE SYNC ───
      // Auto-refresh hook for React components.
      // Usage: const products = SiteForge.useLive('products', []);
      // The data will auto-refresh every 10 seconds (polling) so admin changes appear live.
      useLive: function(resource, fallback) {
        const [data, setData] = React.useState(fallback);
        const [loading, setLoading] = React.useState(true);
        React.useEffect(() => {
          let mounted = true;
          const fetcher = {
            products: () => window.SiteForge.api.fetchProducts(),
            reviews: () => window.SiteForge.api.fetchReviews(),
            flashsale: () => window.SiteForge.api.getCurrentFlashSale(),
            loyalty: () => window.SiteForge.api.getLoyaltyConfig(),
          }[resource];
          if (!fetcher) return;
          const refresh = async () => {
            try {
              const result = await fetcher();
              if (mounted) { setData(result); setLoading(false); }
            } catch (e) { if (mounted) setLoading(false); }
          };
          refresh();
          const interval = setInterval(refresh, 10000); // poll every 10s
          return () => { mounted = false; clearInterval(interval); };
        }, [resource]);
        return [data, loading];
      },
    };
    window.SiteForge.api.root = window.SiteForge.backendUrl + '/api/shops/' + window.SiteForge.shopId;
  </script>
